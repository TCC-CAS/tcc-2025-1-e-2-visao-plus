<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Produtos Loja</title>
    <link rel="stylesheet" href="css/pages/ProdutosLoja.css">
</head>

<body>

    <div id="mensagensTopo">
        <div id="msgProdutosLoja" class="toast"></div>
    </div>

    <!-- HEADER UNIVERSAL -->
    <div id="app-header"></div>


    <!-- Conteúdo Principal -->
    <section class="main-content" id="Conteudo-Principal">

        <div class="titulo-wrapper">
            <p class="titulo-secao">Administração de Produtos -</p>
            <span id="nomeLoja" class="span"></span>
        </div>

        <div class="listas-wrapper">

            <!--lista de armações-->
            <section class="armacao-section">

                <h3>Minhas Armações</h3>

                <button class="btn-adicionar" id="btn-adicionar-armacao">
                    + Adicionar Produto
                </button>
                <section id="armacao-lista" class="lista-horizontal"></section>

            </section>

            <!--lista de lentes-->
            <section class="lente-section">

                <h3>Minhas Lentes</h3>

                <button class="btn-adicionar" id="btn-adicionar-lente">
                    + Adicionar Produto
                </button>
                <section id="lente-lista" class="lista-horizontal"></section>


            </section>

        </div>
</body>

<!-- Modal para adicionar armação -->
<div id="modal-adicionar-armacao" class="modal hidden">
    <div class="modal-content">
        <span id="fechar-modal-armacao" class="fechar-modal">&times;</span>

        <h2>Adicionar Armação</h2>
        <div class="modal-body">
            <div class="foto-armacao-area">
                <img id="preview-foto-armacao" src="" alt="Foto armacao" class="foto-preview">

                <form id="form-foto-armacao">
                    <input type="file" id="foto-armacao-criar" accept="image/*" required>
                    <button type="submit">Salvar nova foto</button>
                </form>
            </div>

            <form id="form-adicionar-armacao">
                <label for="nome-armacao">Nome da Armação:</label>
                <input type="text" id="nome-armacao" name="nomeArmacao" required>

                <label for="tipo-armacao">Tipo da Armação:</label>
                <input type="text" id="tipo-armacao" name="tipoArmacao" required>

                <label for="marca-armacao">Marca da Armação:</label>
                <input type="text" id="marca-armacao" name="marcaArmacao" required>

                <label for="modelo-armacao">Modelo da Armação:</label>
                <input type="text" id="modelo-armacao" name="modeloArmacao" required>

                <label for="material-armacao">Material da Armação:</label>
                <input type="text" id="material-armacao" name="materialArmacao" required>

                <label for="descricao-armacao">Descrição:</label>
                <textarea id="descricao-armacao" name="descricaoArmacao" required></textarea>

                <label for="preco-armacao">Preço:</label>
                <input type="number" id="preco-armacao" name="precoArmacao" step="0.01" required>

                <button type="submit" class="btn-salvar">Salvar Armacao</button>
            </form>
        </div>
    </div>
</div>

<!--Modal para editar Armacao-->
<div id="modal-editar-armacao" class="modal hidden">
    <div class="modal-content">
        <span id="fechar-modal-editar-armacao" class="fechar-modal">&times;</span>

        <h2>Editar Armação</h2>
        <div class="modal-body">
            <div class="foto-armacao-area">
                <img id="preview-foto-armacao-edit" src="" alt="Foto armacao" class="foto-preview">

                <form id="form-foto-armacao-edit">
                    <input type="file" id="foto-armacao-edit" accept="image/*" required>
                    <button type="submit">Salvar nova foto</button>
                </form>
            </div>

            <form id="form-editar-armacao">
                <label for="nome-armacao-edit">Nome da Armação:</label>
                <input type="text" id="nome-armacao-edit" name="nomeArmacaoEdit" required>

                <label for="tipo-armacao-edit">Tipo da Armação:</label>
                <input type="text" id="tipo-armacao-edit" name="tipoArmacaoEdit" required>

                <label for="marca-armacao-edit">Marca da Armação:</label>
                <input type="text" id="marca-armacao-edit" name="marcaArmacaoEdit" required>

                <label for="modelo-armacao-edit">Modelo da Armação:</label>
                <input type="text" id="modelo-armacao-edit" name="modeloArmacaoEdit" required>

                <label for="material-armacao-edit">Material da Armação:</label>
                <input type="text" id="material-armacao-edit" name="materialArmacaoEdit" required>

                <label for="descricao-armacao-edit">Descrição:</label>
                <textarea id="descricao-armacao-edit" name="descricaoArmacaoEdit" required></textarea>

                <label for="preco-armacao-edit">Preço:</label>
                <input type="number" id="preco-armacao-edit" name="precoArmacaoEdit" step="0.01" required>

                <button type="submit" class="btn-salvar">Salvar Armacao</button>
            </form>
        </div>
    </div>
</div>

<!-- Modal para adicionar lente -->
<div id="modal-adicionar-lente" class="modal hidden">
    <div class="modal-content">
        <span id="fechar-modal-lente" class="fechar-modal">&times;</span>

        <h2>Adicionar Lente</h2>
        <div class="modal-body">
            <div class="foto-lente-area">
                <img id="preview-foto-lente" src="" alt="Foto lente" class="foto-preview">

                <form id="form-foto-lente">
                    <input type="file" id="foto-lente-criar" accept="image/*" required>
                    <button type="submit">Salvar nova foto</button>
                </form>
            </div>

            <form id="form-adicionar-lente">
                <label for="nome-lente">Nome da Lente:</label>
                <input type="text" id="nome-lente" name="nomeLente" required>

                <label for="tipo-lente">Tipo da Lente:</label>
                <input type="text" id="tipo-lente" name="tipoLente" required>

                <label for="marca-lente">Marca da Lente:</label>
                <input type="text" id="marca-lente" name="marcaLente" required>

                <label for="modelo-lente">Modelo da Lente:</label>
                <input type="text" id="modelo-lente" name="modeloLente" required>

                <label for="material-lente">Material da Lente:</label>
                <input type="text" id="material-lente" name="materialLente" required>

                <label for="descricao-lente">Descrição:</label>
                <textarea id="descricao-lente" name="descricaoLente" required></textarea>

                <label for="preco-lente">Preço:</label>
                <input type="number" id="preco-lente" name="precoLente" step="0.01" required>

                <button type="submit" class="btn-salvar">Salvar Lente</button>
            </form>
        </div>
    </div>
</div>

<!--Modal para editar Lente-->
<div id="modal-editar-lente" class="modal hidden">
    <div class="modal-content">
        <span id="fechar-modal-editar-lente" class="fechar-modal">&times;</span>

        <h2>Editar Lente</h2>
        <div class="modal-body">
            <div class="foto-lente-area">
                <img id="preview-foto-lente-edit" src="" alt="Foto lente" class="foto-preview">

                <form id="form-foto-lente-edit">
                    <input type="file" id="foto-lente-edit" accept="image/*" required>
                    <button type="submit">Salvar nova foto</button>
                </form>
            </div>

            <form id="form-editar-lente">
                <label for="nome-lente-edit">Nome do Produto:</label>
                <input type="text" id="nome-lente-edit" name="nomeLenteEdit" required>

                <label for="tipo-lente-edit">Tipo da Lente:</label>
                <input type="text" id="tipo-lente-edit" name="tipoLenteEdit" required>

                <label for="marca-lente-edit">Marca da Lente:</label>
                <input type="text" id="marca-lente-edit" name="marcaLenteEdit" required>

                <label for="modelo-lente-edit">Modelo da Lente:</label>
                <input type="text" id="modelo-lente-edit" name="modeloLenteEdit" required>

                <label for="material-lente-edit">Material da Lente:</label>
                <input type="text" id="material-lente-edit" name="materialLenteEdit" required>

                <label for="descricao-lente-edit">Descrição:</label>
                <textarea id="descricao-lente-edit" name="descricaoLenteEdit" required></textarea>

                <label for="preco-lente-edit">Preço:</label>
                <input type="number" id="preco-lente-edit" name="precoLenteEdit" step="0.01" required>

                <button type="submit" class="btn-salvar">Salvar Lente</button>
            </form>
        </div>
    </div>
</div>
<script type="module" src="JS/pages/PaginaProdutosLoja.js"></script>

</html>
