<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Loja</title>
    <link rel="stylesheet" href="css/pages/PaginaLoja.css">
</head>



<body>

    <button id="btn-cotacao" class="btn-cotacao-flutuante">
        🧾 Cotação
    </button>

    <div id="app-header"></div>

    <section class="loja-header">
        <div class="foto-loja">
            <img src="" id="loja-foto" alt="Foto-da-loja" class="loja-foto">
        </div>
        <div class="dados-loja">
            <h1 id="loja-nome"></h1>
            <p id="loja-email"></p>
            <p id="loja-endereco"></p>
        </div>
    </section>

    <section>
        <h2>Produtos</h2><br>

        <section class="lentes">
            <h2>Lentes</h2>
            <div id="lista-lentes"></div>
        </section>

        <section class="armacoes">
            <h2>Armações</h2>
            <div id="lista-armacoes"></div>
        </section>

    </section>

    <div id="modal-cotacao" class="modal-cotacao">
        <div class="modal-cotacao-content">

            <button id="fechar-modal-cotacao" class="fechar-modal">✕</button>

            <h2>Cotação</h2>

            <div class="resumo-produtos">

                <div class="produto-resumo">
                    <img id="foto-lente" src="imgs/store1.png">
                    <div id="Lente"></div>
                </div>

                <div class="produto-resumo">
                    <img id="foto-armacao" src="imgs/store1.png">
                    <div id="Armacao"></div>
                </div>

            </div>

            <form id="form-cotacao">

                <label>
                    Grau esquerdo
                    <input id="grau-esq" type="number" step="0.25" min="0">
                </label>

                <label>
                    Grau direito
                    <input id="grau-dir" type="number" step="0.25" min="0">
                </label>

                <label>
                    Nome
                    <input id="edit-nome-usuario" required>
                </label>

                <label>
                    Email
                    <input id="edit-email-usuario" type="email" required>
                </label>

                <button type="submit" class="button">Enviar cotação</button>
            </form>

        </div>
    </div>

    <div id="modal-produto" class="modal-produto">
        <div class="modal-produto-content">

            <button id="fechar-modal-produto">✕</button>

            <div class="produto-imagem-modal">
                <img id="produto-imagem" src="" alt="Produto">
            </div>

            <span id="produto-nome"></span>
            <span id="produto-tipo"></span>

            <div class="produto-info-linha">
                <div class="produto-info-item">
                    <label>Marca:</label>
                    <span id="produto-marca"></span>
                </div>

                <div class="produto-info-item">
                    <label>Modelo:</label>
                    <span id="produto-modelo"></span>
                </div>

                <div class="produto-info-item">
                    <label>Material:</label>
                    <span id="produto-material"></span>
                </div>
            </div>

            <span id="produto-descricao"></span>
            <span id="produto-preco"></span>

            <button id="btn-adicionar-cotacao">
                Adicionar à cotação
            </button>

        </div>
    </div>

</body>



</section>

<script type="module" src="JS/pages/PaginaLoja.js"></script>

</html>
