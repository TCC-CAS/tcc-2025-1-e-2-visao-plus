<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="css/pages/Cadastro.css">

</head>

<body>
    <div id="mensagensTopo">
        <div id="msgNome" class="toast"></div>
        <div id="msgEmail" class="toast"></div>
        <div id="msgSenha" class="toast"></div>
    </div>

    <div id="app-header"></div>

    <div class="container-cadastro">
        <h1>Cadastro de Usuário</h1>
        <form id="cadastroForm">

            <label for="nome">Nome de usuário:</label>
            <input type="text" id="nome" name="nome" autocomplete="username" placeholder="Nome de usuário" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" autocomplete="username@useremail.com" placeholder="E-mail"
                required>

            <div id="erroSenha" class="erro-senha"></div>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" autocomplete="current-password" placeholder="Senha" required><br>
            <div id="regrasCard" class="regras-card">
                <h4>Regras da senha:</h4>
                <ul>
                    <li id="regraTamanho">Mínimo 8 caracteres</li>
                    <li id="regraMaiuscula">Pelo menos 1 letra maiúscula</li>
                    <li id="regraMinuscula">Pelo menos 1 letra minúscula</li>
                    <li id="regraNumero">Pelo menos 1 número</li>
                    <li id="regraEspecial">Pelo menos 1 caractere especial</li>
                    <li id="regraProibido">Não pode conter &lt; ou &gt;</li>
                </ul>
            </div>

            <label for="confirmarSenha">Confirmar Senha:</label>
            <input type="password" id="confirmarSenha" name="confirmarSenha" autocomplete="confirm-password"
                placeholder="Confirme a senha" required><br>

            <button type="submit">Registrar</button>
        </form>
        <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
    </div>
    <script type="module" src="JS/pages/Cadastro.Js"></script>
</body>

</html>
